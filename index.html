<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开发者工具箱</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🛠️ 开发者工具箱</h1>
    <p class="subtitle">常用开发小工具，开箱即用</p>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="json">JSON</button>
    <button class="tab" data-tab="qr">QR 码</button>
    <button class="tab" data-tab="password">密码</button>
    <button class="tab" data-tab="color">颜色</button>
    <button class="tab" data-tab="base64">Base64</button>
    <button class="tab" data-tab="timestamp">时间戳</button>
    <button class="tab" data-tab="url">URL</button>
    <button class="tab" data-tab="uuid">UUID</button>
    <button class="tab" data-tab="hash">Hash</button>
    <button class="tab" data-tab="jwt">JWT</button>
    <button class="tab" data-tab="openclaw">OpenClaw</button>
  </nav>

  <main>
    <!-- JSON 格式化/压缩 -->
    <section class="panel active" id="panel-json">
      <div class="tool-header">
        <h2>JSON 格式化 / 压缩</h2>
        <div class="actions">
          <button onclick="formatJSON()" class="btn btn-primary">格式化</button>
          <button onclick="compressJSON()" class="btn">压缩</button>
          <button onclick="copyText('json-output')" class="btn">复制</button>
          <button onclick="clearJSON()" class="btn btn-ghost">清空</button>
        </div>
      </div>
      <div class="io-grid">
        <div class="io-col">
          <label>输入</label>
          <textarea id="json-input" placeholder="在此粘贴 JSON 数据..." spellcheck="false"></textarea>
        </div>
        <div class="io-col">
          <label>输出</label>
          <textarea id="json-output" readonly placeholder="结果将显示在这里..." spellcheck="false"></textarea>
        </div>
      </div>
      <p id="json-error" class="error-msg"></p>
    </section>

    <!-- QR 码生成器 -->
    <section class="panel" id="panel-qr">
      <div class="tool-header">
        <h2>QR 码生成器</h2>
      </div>
      <div class="qr-container">
        <div class="qr-input-area">
          <textarea id="qr-text" placeholder="输入文本或网址..." rows="4"></textarea>
          <div class="qr-options">
            <label>尺寸:
              <select id="qr-size">
                <option value="128">128×128</option>
                <option value="256" selected>256×256</option>
                <option value="512">512×512</option>
              </select>
            </label>
            <label>前景色: <input type="color" id="qr-fg" value="#000000"></label>
            <label>背景色: <input type="color" id="qr-bg" value="#ffffff"></label>
          </div>
          <div class="actions">
            <button onclick="generateQR()" class="btn btn-primary">生成 QR 码</button>
            <button onclick="downloadQR()" class="btn">下载 PNG</button>
          </div>
        </div>
        <div class="qr-output-area">
          <div id="qr-result"></div>
        </div>
      </div>
    </section>

    <!-- 密码生成器 -->
    <section class="panel" id="panel-password">
      <div class="tool-header">
        <h2>密码生成器</h2>
      </div>
      <div class="password-container">
        <div class="password-display">
          <input type="text" id="password-output" readonly placeholder="点击生成按钮">
          <button onclick="copyText('password-output')" class="btn btn-icon" title="复制">📋</button>
        </div>
        <div class="password-options">
          <div class="slider-group">
            <label>密码长度: <span id="pwd-len-val">16</span></label>
            <input type="range" id="pwd-length" min="4" max="64" value="16" oninput="document.getElementById('pwd-len-val').textContent=this.value">
          </div>
          <div class="checkbox-group">
            <label><input type="checkbox" id="pwd-upper" checked> 大写字母 (A-Z)</label>
            <label><input type="checkbox" id="pwd-lower" checked> 小写字母 (a-z)</label>
            <label><input type="checkbox" id="pwd-number" checked> 数字 (0-9)</label>
            <label><input type="checkbox" id="pwd-symbol" checked> 特殊字符 (!@#$%)</label>
          </div>
          <div class="actions">
            <button onclick="generatePassword()" class="btn btn-primary">生成密码</button>
            <button onclick="generatePasswords(10)" class="btn">批量生成 10 个</button>
          </div>
        </div>
        <div id="password-batch" class="password-batch"></div>
      </div>
    </section>

    <!-- 颜色转换器 -->
    <section class="panel" id="panel-color">
      <div class="tool-header">
        <h2>颜色转换器</h2>
      </div>
      <div class="color-container">
        <div class="color-preview" id="color-preview" style="background: #6366f1;"></div>
        <div class="color-inputs">
          <div class="color-row">
            <label>HEX</label>
            <input type="text" id="color-hex" value="#6366f1" placeholder="#RRGGBB" oninput="convertFromHex()">
          </div>
          <div class="color-row">
            <label>RGB</label>
            <div class="color-triple">
              <input type="number" id="color-r" min="0" max="255" value="99" oninput="convertFromRGB()">
              <input type="number" id="color-g" min="0" max="255" value="102" oninput="convertFromRGB()">
              <input type="number" id="color-b" min="0" max="255" value="241" oninput="convertFromRGB()">
            </div>
          </div>
          <div class="color-row">
            <label>HSL</label>
            <div class="color-triple">
              <input type="number" id="color-h" min="0" max="360" value="239" oninput="convertFromHSL()">
              <input type="number" id="color-s" min="0" max="100" value="84" oninput="convertFromHSL()">
              <input type="number" id="color-l" min="0" max="100" value="67" oninput="convertFromHSL()">
            </div>
          </div>
          <div class="color-row">
            <label>选择</label>
            <input type="color" id="color-picker" value="#6366f1" oninput="convertFromPicker()">
          </div>
        </div>
        <div class="color-actions">
          <button onclick="copyColorValue('hex')" class="btn">复制 HEX</button>
          <button onclick="copyColorValue('rgb')" class="btn">复制 RGB</button>
          <button onclick="copyColorValue('hsl')" class="btn">复制 HSL</button>
        </div>
      </div>
    </section>

    <!-- Base64 编解码 -->
    <section class="panel" id="panel-base64">
      <div class="tool-header">
        <h2>Base64 编解码</h2>
        <div class="actions">
          <button onclick="base64Encode()" class="btn btn-primary">编码</button>
          <button onclick="base64Decode()" class="btn">解码</button>
          <button onclick="copyText('base64-output')" class="btn">复制</button>
          <button onclick="swapBase64()" class="btn btn-ghost">⇄ 交换</button>
        </div>
      </div>
      <div class="io-grid">
        <div class="io-col">
          <label>明文 / Base64</label>
          <textarea id="base64-input" placeholder="在此输入内容..." spellcheck="false"></textarea>
        </div>
        <div class="io-col">
          <label>Base64 / 明文</label>
          <textarea id="base64-output" readonly placeholder="结果将显示在这里..." spellcheck="false"></textarea>
        </div>
      </div>
      <p id="base64-error" class="error-msg"></p>
    </section>

    <!-- 时间戳转换 -->
    <section class="panel" id="panel-timestamp">
      <div class="tool-header">
        <h2>时间戳 ↔ 日期</h2>
        <div class="actions">
          <button onclick="tsNow()" class="btn btn-primary">取当前时间</button>
          <button onclick="tsFromInput()" class="btn">转换</button>
        </div>
      </div>
      <div class="ts-container">
        <div class="ts-row">
          <label>时间戳 (秒)</label>
          <div class="ts-input-group">
            <input type="number" id="ts-seconds" placeholder="1742284800">
            <button onclick="copyText('ts-seconds')" class="btn">复制</button>
          </div>
        </div>
        <div class="ts-row">
          <label>时间戳 (毫秒)</label>
          <div class="ts-input-group">
            <input type="number" id="ts-millis" placeholder="1742284800000">
            <button onclick="copyText('ts-millis')" class="btn">复制</button>
          </div>
        </div>
        <div class="ts-row">
          <label>UTC</label>
          <div class="ts-input-group">
            <input type="text" id="ts-utc" readonly>
          </div>
        </div>
        <div class="ts-row">
          <label>北京时间</label>
          <div class="ts-input-group">
            <input type="text" id="ts-cst" readonly>
          </div>
        </div>
        <div class="ts-row">
          <label>ISO 8601</label>
          <div class="ts-input-group">
            <input type="text" id="ts-iso" readonly>
            <button onclick="copyText('ts-iso')" class="btn">复制</button>
          </div>
        </div>
        <div class="ts-row">
          <label>手动输入日期</label>
          <div class="ts-input-group">
            <input type="text" id="ts-manual" placeholder="2026-03-18 10:00:00">
            <button onclick="tsFromManual()" class="btn btn-primary">转换</button>
          </div>
        </div>
      </div>
    </section>

    <!-- URL 编解码 -->
    <section class="panel" id="panel-url">
      <div class="tool-header">
        <h2>URL 编解码</h2>
        <div class="actions">
          <button onclick="urlEncode()" class="btn btn-primary">编码</button>
          <button onclick="urlDecode()" class="btn">解码</button>
          <button onclick="copyText('url-output')" class="btn">复制</button>
          <button onclick="swapUrl()" class="btn btn-ghost">⇄ 交换</button>
        </div>
      </div>
      <div class="io-grid">
        <div class="io-col">
          <label>明文</label>
          <textarea id="url-input" placeholder="在此输入 URL 或文本..." spellcheck="false"></textarea>
        </div>
        <div class="io-col">
          <label>编码结果</label>
          <textarea id="url-output" readonly placeholder="结果将显示在这里..." spellcheck="false"></textarea>
        </div>
      </div>
      <p id="url-error" class="error-msg"></p>
    </section>

    <!-- UUID 生成器 -->
    <section class="panel" id="panel-uuid">
      <div class="tool-header">
        <h2>UUID 生成器</h2>
        <div class="actions">
          <button onclick="generateUUID()" class="btn btn-primary">生成 UUID v4</button>
          <button onclick="generateUUIDs(10)" class="btn">批量生成 10 个</button>
        </div>
      </div>
      <div class="uuid-container">
        <div class="password-display">
          <input type="text" id="uuid-output" readonly placeholder="点击生成按钮">
          <button onclick="copyText('uuid-output')" class="btn btn-icon" title="复制">📋</button>
        </div>
        <div id="uuid-batch" class="password-batch"></div>
      </div>
    </section>

    <!-- Hash 生成器 -->
    <section class="panel" id="panel-hash">
      <div class="tool-header">
        <h2>Hash 生成器</h2>
      </div>
      <div class="hash-container">
        <div class="hash-input-area">
          <textarea id="hash-input" placeholder="在此输入要哈希的文本..." rows="5" spellcheck="false"></textarea>
          <div class="hash-algo-row">
            <label>算法:</label>
            <div class="hash-algo-btns">
              <button class="btn active" data-algo="sha256" onclick="setHashAlgo(this)">SHA-256</button>
              <button class="btn" data-algo="sha1" onclick="setHashAlgo(this)">SHA-1</button>
              <button class="btn" data-algo="md5" onclick="setHashAlgo(this)">MD5</button>
            </div>
          </div>
          <button onclick="computeHash()" class="btn btn-primary" style="margin-top:0.8rem">计算 Hash</button>
        </div>
        <div class="hash-output-area">
          <div class="hash-result-row">
            <label>结果 (lowercase)</label>
            <div class="ts-input-group">
              <input type="text" id="hash-output-lower" readonly>
              <button onclick="copyText('hash-output-lower')" class="btn">复制</button>
            </div>
          </div>
          <div class="hash-result-row">
            <label>结果 (UPPERCASE)</label>
            <div class="ts-input-group">
              <input type="text" id="hash-output-upper" readonly>
              <button onclick="copyText('hash-output-upper')" class="btn">复制</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- JWT 解码器 -->
    <section class="panel" id="panel-jwt">
      <div class="tool-header">
        <h2>JWT 解码器</h2>
        <div class="actions">
          <button onclick="decodeJWT()" class="btn btn-primary">解码</button>
          <button onclick="clearJWT()" class="btn btn-ghost">清空</button>
        </div>
      </div>
      <div class="io-grid">
        <div class="io-col">
          <label>JWT Token</label>
          <textarea id="jwt-input" placeholder="在此粘贴 JWT..." spellcheck="false"></textarea>
        </div>
        <div class="io-col jwt-decoded">
          <label>Payload (JSON)</label>
          <textarea id="jwt-header" readonly placeholder="Header..." spellcheck="false"></textarea>
          <textarea id="jwt-payload" readonly placeholder="Payload..." spellcheck="false" style="margin-top:0.5rem"></textarea>
        </div>
      </div>
      <p id="jwt-error" class="error-msg"></p>
    </section>

    <!-- OpenClaw 配置生成器 -->
    <section class="panel" id="panel-openclaw">
      <div class="tool-header">
        <h2>OpenClaw 配置生成器</h2>
        <div class="actions">
          <button onclick="generateOpenClawConfig()" class="btn btn-primary">生成配置</button>
          <button onclick="copyText('oc-output')" class="btn">复制 JSON</button>
          <button onclick="downloadOpenClawConfig()" class="btn">下载 openclaw.json</button>
        </div>
      </div>

      <div class="openclaw-layout">
        <!-- 表单区域 -->
        <div class="openclaw-form">

          <!-- 模型配置 -->
          <fieldset class="oc-group">
            <legend>模型配置</legend>
            <div class="oc-field">
              <label for="oc-provider">Provider</label>
              <select id="oc-provider">
                <option value="openrouter">OpenRouter</option>
                <option value="dashscope">DashScope (阿里云)</option>
                <option value="google">Google Gemini</option>
                <option value="siliconflow">SiliconFlow</option>
                <option value="custom">自定义</option>
              </select>
            </div>
            <div class="oc-field">
              <label for="oc-model-id">模型 ID</label>
              <input type="text" id="oc-model-id" placeholder="anthropic/claude-sonnet-4">
            </div>
            <div class="oc-field">
              <label for="oc-api-key">API Key</label>
              <input type="password" id="oc-api-key" placeholder="sk-...">
            </div>
            <div class="oc-field">
              <label for="oc-api-base">API Base URL（留空使用默认）</label>
              <input type="text" id="oc-api-base" placeholder="https://openrouter.ai/api/v1">
            </div>
          </fieldset>

          <!-- Nextcloud Talk -->
          <fieldset class="oc-group">
            <legend>Nextcloud Talk</legend>
            <div class="oc-toggle-row">
              <label class="oc-toggle">
                <input type="checkbox" id="oc-nextcloud-enabled">
                <span>启用 Nextcloud Talk</span>
              </label>
            </div>
            <div id="oc-nextcloud-fields">
              <div class="oc-field">
                <label for="oc-nextcloud-url">Base URL</label>
                <input type="text" id="oc-nextcloud-url" placeholder="http://127.0.0.1:8080">
              </div>
              <div class="oc-field">
                <label for="oc-nextcloud-secret">Bot Secret</label>
                <input type="password" id="oc-nextcloud-secret" placeholder="Bot Secret">
              </div>
              <div class="oc-field">
                <label for="oc-nextcloud-user">API 用户</label>
                <input type="text" id="oc-nextcloud-user" value="admin">
              </div>
              <div class="oc-field">
                <label for="oc-nextcloud-pass">API 密码</label>
                <input type="password" id="oc-nextcloud-pass" placeholder="应用密码">
              </div>
              <div class="oc-field">
                <label for="oc-nextcloud-room">房间 Token</label>
                <input type="text" id="oc-nextcloud-room" placeholder="p38vukqg">
              </div>
              <div class="oc-field">
                <label for="oc-nextcloud-webhook">Webhook Public URL</label>
                <input type="text" id="oc-nextcloud-webhook" placeholder="http://IP:8788/nextcloud-talk-webhook">
              </div>
            </div>
          </fieldset>

          <!-- 网关配置 -->
          <fieldset class="oc-group">
            <legend>网关配置</legend>
            <div class="oc-field-row">
              <div class="oc-field">
                <label for="oc-port">端口号</label>
                <input type="number" id="oc-port" value="18789" min="1" max="65535">
              </div>
              <div class="oc-field">
                <label for="oc-mode">模式</label>
                <select id="oc-mode">
                  <option value="local">local</option>
                  <option value="remote">remote</option>
                </select>
              </div>
            </div>
            <div class="oc-field">
              <label for="oc-auth-token">Auth Token</label>
              <div class="oc-input-group">
                <input type="text" id="oc-auth-token" placeholder="点击生成随机 token">
                <button onclick="generateAuthToken()" class="btn btn-sm" type="button">生成</button>
              </div>
            </div>
          </fieldset>

          <!-- 工具配置 -->
          <fieldset class="oc-group">
            <legend>工具配置</legend>
            <div class="oc-toggle-row">
              <label class="oc-toggle">
                <input type="checkbox" id="oc-websearch-enabled" checked>
                <span>Web Search (Brave)</span>
              </label>
            </div>
            <div class="oc-field oc-sub-field" id="oc-websearch-fields">
              <label for="oc-brave-key">Brave Search API Key</label>
              <input type="password" id="oc-brave-key" placeholder="BSA...">
            </div>
          </fieldset>
        </div>

        <!-- JSON 输出区域 -->
        <div class="openclaw-output">
          <div class="oc-paste-area">
            <label>粘贴已有 openclaw.json 反向解析</label>
            <textarea id="oc-paste-input" placeholder='{"meta":{...},"models":{...}}' spellcheck="false"></textarea>
            <button onclick="parseOpenClawJson()" class="btn">解析并填充表单</button>
          </div>
          <div class="oc-output-area">
            <label>生成的 openclaw.json</label>
            <textarea id="oc-output" readonly placeholder="点击「生成配置」按钮..." spellcheck="false"></textarea>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast 通知 -->
  <div id="toast" class="toast"></div>

  <footer>
    <p>开发者工具箱 · 纯前端实现 · 数据不上传</p>
  </footer>

  <script src="qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
